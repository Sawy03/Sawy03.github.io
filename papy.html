<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Entry — Google Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0efe9;
    --surface: #ffffff;
    --surface2: #f7f6f2;
    --border: #e3e1d8;
    --border2: #ccc9be;
    --text: #1c1b18;
    --text2: #5a5852;
    --text3: #9a9790;
    --green: #2a6049;
    --green-light: #e6f2ec;
    --green-mid: #4ea37a;
    --red: #b83c10;
    --red-light: #fceee9;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 2px rgba(0,0,0,0.05), 0 3px 10px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 5rem;
  }

  .page-header {
    width: 100%;
    max-width: 660px;
    margin-bottom: 2rem;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }

  .page-header p {
    font-size: 13.5px;
    color: var(--text3);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 660px;
    overflow: hidden;
  }

  .card-block {
    padding: 1.4rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .block-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.85rem;
  }

  .select-wrap { position: relative; }

  .sheet-select {
    width: 100%;
    height: 46px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 40px 0 14px;
    appearance: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .sheet-select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(42,96,73,0.1);
  }

  .select-chevron {
    position: absolute;
    right: 13px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text3);
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1fr 110px 130px 34px;
    gap: 8px;
    padding: 0 10px;
    margin-bottom: 6px;
  }

  .col-headers span {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .rows-wrap { display: flex; flex-direction: column; gap: 8px; }

  .entry-row {
    display: grid;
    grid-template-columns: 1fr 110px 130px 34px;
    gap: 8px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: slideIn 0.17s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-row:focus-within {
    border-color: var(--border2);
    box-shadow: var(--shadow);
    background: var(--surface);
  }

  .entry-row input {
    height: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .entry-row input:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 2px rgba(78,163,122,0.1);
  }

  .entry-row input::placeholder { color: var(--text3); }

  .price-wrap { position: relative; }

  .price-wrap::before {
    content: '$';
    position: absolute;
    left: 9px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text3);
    pointer-events: none;
  }

  .price-wrap input { padding-left: 20px; }

  .del-btn {
    width: 32px; height: 32px;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .del-btn:hover {
    border-color: var(--red);
    background: var(--red-light);
    color: var(--red);
  }

  .add-btn {
    margin-top: 10px;
    width: 100%;
    height: 38px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all 0.15s;
  }

  .add-btn:hover {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
  }

  .add-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    line-height: 1;
  }

  .total-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: var(--green-light);
    border-top: 1px solid #c4dfd2;
  }

  .total-left { display: flex; align-items: center; gap: 8px; }
  .total-label { font-size: 13px; font-weight: 500; color: var(--green); }
  .total-items { font-size: 12px; color: #4ea37a; }

  .total-amount {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: -0.5px;
  }

  .footer-actions {
    display: flex;
    gap: 10px;
    padding: 1.25rem 1.5rem;
  }

  .btn {
    height: 42px;
    border-radius: var(--radius-sm);
    padding: 0 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: all 0.15s;
    outline: none;
  }

  .btn-ghost {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
  }

  .btn-ghost:hover { background: var(--border); color: var(--text); }

  .btn-submit {
    flex: 1;
    border: none;
    background: var(--green);
    color: #fff;
    justify-content: center;
  }

  .btn-submit:hover { background: #1f4d3b; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: #a8c5b8; cursor: not-allowed; }

  .toasts {
    position: fixed;
    bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 99;
  }

  .toast {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    animation: toastIn 0.2s ease-out;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    max-width: 300px;
  }

  .toast.ok   { background: var(--green); color: #fff; }
  .toast.err  { background: var(--red);   color: #fff; }
  .toast.info { background: var(--text);  color: #fff; }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(6px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Sheet Entry</h1>
  <p>Choose a sheet, fill in your items, and submit.</p>
</div>

<div class="card">
  <!-- Sheet selector -->
  <div class="card-block">
    <div class="block-label">Select Sheet</div>
    <div class="select-wrap">
      <select class="sheet-select" id="sheetSelect">
        <option value="">— Choose a sheet —</option>
        <option value="Sheet1">احمد بحراوي</option>
        <option value="Sheet2">شعبان غابة</option>
        <option value="Sheet3">علي جنينة</option>
      </select>
      <div class="select-chevron">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Entry rows -->
  <div class="card-block">
    <div class="block-label">Items</div>
    <div class="col-headers">
      <span>Name</span>
      <span>Quantity</span>
      <span>Price</span>
      <span></span>
    </div>
    <div class="rows-wrap" id="rowsWrap"></div>
    <button class="add-btn" onclick="addRow()">
      <span class="add-icon">+</span>
      Add item
    </button>
  </div>

  <!-- Total -->
  <div class="total-bar">
    <div class="total-left">
      <span class="total-label">Total</span>
      <span class="total-items" id="itemCount"></span>
    </div>
    <span class="total-amount" id="totalAmt">$0.00</span>
  </div>

  <!-- Actions -->
  <div class="footer-actions">
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
    <button class="btn btn-submit" id="submitBtn" onclick="handleSubmit()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v9M3.5 6.5L7 10l3.5-3.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 12h11" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Submit to Sheet
    </button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
  /* ══════════════════════════════════════════
     CONFIG — REPLACE WITH YOUR APPS SCRIPT URL
     ══════════════════════════════════════════ */
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUJ_XgrpmdgZfPcQTGmuqVGUyoBzCAvaW-5sMyjx7SfT3Bbmo2cuaU4CeaIoXoGwTwKA/exec'; // ← PASTE YOUR URL
  
  /* ══════════════════════════════════════════
     ROW LOGIC
     ══════════════════════════════════════════ */
let rowIdx = 0;

// Add first hardcoded row
function addFirstRow() {
  const n = ++rowIdx;
  const div = document.createElement('div');
  div.className = 'entry-row';
  div.id = `row${n}`;
  div.innerHTML = `
    <input type="text"   id="n${n}" placeholder="Item name" value="كيماوي">
    <input type="number" id="q${n}" placeholder="0"   min="0" step="1" oninput="recalc()">
    <div class="price-wrap">
      <input type="number" id="p${n}" placeholder="0.00" min="0" step="0.01" oninput="recalc()">
    </div>
    <button class="del-btn" onclick="removeRow(${n})" title="Remove row">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>`;
  document.getElementById('rowsWrap').appendChild(div);
}

// Add second hardcoded row
function addSecondRow() {
  const n = ++rowIdx;
  const div = document.createElement('div');
  div.className = 'entry-row';
  div.id = `row${n}`;
  div.innerHTML = `
    <input type="text"   id="n${n}" placeholder="Item name" value="حرت" oninput="recalc()">
    <input type="number" id="q${n}" placeholder="0"   min="0" step="1"  oninput="recalc()">
    <div class="price-wrap">
      <input type="number" id="p${n}" placeholder="0.00" min="0" step="0.01" oninput="recalc()">
    </div>
    <button class="del-btn" onclick="removeRow(${n})" title="Remove row">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>`;
  document.getElementById('rowsWrap').appendChild(div);
}

// Regular add row function (empty)
function addRow() {
  const n = ++rowIdx;
  const div = document.createElement('div');
  div.className = 'entry-row';
  div.id = `row${n}`;
  div.innerHTML = `
    <input type="text"   id="n${n}" placeholder="Item name" oninput="recalc()">
    <input type="number" id="q${n}" placeholder="0"   min="0" step="1" oninput="recalc()">
    <div class="price-wrap">
      <input type="number" id="p${n}" placeholder="0.00" min="0" step="0.01" oninput="recalc()">
    </div>
    <button class="del-btn" onclick="removeRow(${n})" title="Remove row">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>`;
  document.getElementById('rowsWrap').appendChild(div);
}

// Initialize with 2 hardcoded rows + 1 empty row
addFirstRow();
addSecondRow();
addRow();

  function removeRow(n) {
    document.getElementById(`row${n}`)?.remove();
    recalc();
  }

  function recalc() {
    let total = 0, count = 0;
    document.querySelectorAll('.entry-row').forEach(row => {
      const i = row.id.replace('row', '');
      const q = parseFloat(document.getElementById(`q${i}`)?.value) || 0;
      const p = parseFloat(document.getElementById(`p${i}`)?.value) || 0;
      if (q && p) { total += q * p; count++; }
    });
    document.getElementById('totalAmt').textContent  = '$' + total.toFixed(2);
    document.getElementById('itemCount').textContent = count ? `· ${count} item${count !== 1 ? 's' : ''}` : '';
  }

  function clearAll() {
    document.getElementById('rowsWrap').innerHTML = '';
    rowIdx = 0;
    addRow(); addRow(); addRow();
    recalc();
  }

  /* ══════════════════════════════════════════
     SUBMIT via Apps Script
     ══════════════════════════════════════════ */
  async function handleSubmit() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
      toast('Please configure the Apps Script URL first', 'err');
      return;
    }

    const sheet = document.getElementById('sheetSelect').value;
    if (!sheet) { toast('Please choose a sheet first.', 'err'); return; }

    const rows = [];
    document.querySelectorAll('.entry-row').forEach(row => {
      const i     = row.id.replace('row', '');
      const name  = document.getElementById(`n${i}`)?.value.trim() || '';
      const qty   = parseFloat(document.getElementById(`q${i}`)?.value) || '';
      const price = parseFloat(document.getElementById(`p${i}`)?.value) || '';
      if (name || qty || price) rows.push([name, qty, price]);
    });

    if (!rows.length) { toast('Add at least one item.', 'err'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled  = true;
    btn.innerHTML = '<div class="spinner"></div> Submitting…';

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Important for Apps Script web apps
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          sheet: sheet,
          rows: rows
        })
      });

      // Note: With mode: 'no-cors', we can't read the response
      // So we assume success if no error thrown
      toast(`${rows.length} row${rows.length !== 1 ? 's' : ''} added to "${sheet}"!`, 'ok');
      clearAll();
      
    } catch (e) {
      toast('Error submitting. Check console for details.', 'err');
      console.error('Submit error:', e);
    } finally {
      btn.disabled  = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v9M3.5 6.5L7 10l3.5-3.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 12h11" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg> Submit to Sheet`;
    }
  }

  /* ══════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════ */
  function toast(msg, type = 'info') {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${{ ok: '✓', err: '✕', info: 'ℹ' }[type]}</span>${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
</script>
</body>
</html>
